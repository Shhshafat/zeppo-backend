<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZEPPO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; padding: 35px; border-radius: 16px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { color: #ff6b00; font-size: 32px; }
        .logo p { color: #888; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; font-weight: bold; }
        .form-group input { width: 100%; padding: 11px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        .form-group input:focus { border-color: #ff6b00; }
        .btn { width: 100%; padding: 13px; background-color: #ff6b00; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 5px; }
        .btn:hover { background-color: #e05a00; }
        .error { color: #e74c3c; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; color: #888; }
        .link a { color: #ff6b00; text-decoration: none; font-weight: bold; }
        .admin-link { text-align: center; margin-top: 10px; font-size: 13px; }
        .admin-link a { color: #aaa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <h1>⚡ ZEPPO</h1>
            <p>Login to your account</p>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="btn" onclick="login()">Login</button>

        <p class="error" id="error"></p>

        <div class="link">
            New user? <a href="signup.html">Create Account</a>
        </div>
        <div class="admin-link">
            <a href="admin.html">Admin Panel →</a>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showError('Please fill all fields!');
                return;
            }

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('name', data.name);
                localStorage.setItem('role', data.role);

                if (data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                showError(data.message);
            }
        }

        function showError(msg) {
            document.getElementById('error').textContent = '❌ ' + msg;
            document.getElementById('error').style.display = 'block';
        }
    </script>
</body>
</html>
